version: '3.8'

services:
  # Backend API
  backend:
    build: ./backend
    container_name: resume_backend_mongo
    ports:
      - "8000:8000"
    environment:
      MONGODB_URL: ${MONGODB_URL}
      DATABASE_NAME: resume_screening_db
      SECRET_KEY: ${SECRET_KEY}
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Frontend React App
  frontend:
    build: ./frontend
    container_name: resume_frontend_mongo
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:8000/api
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

  # Optional: Local MongoDB for development
  # mongodb:
  #   image: mongo:6
  #   container_name: resume_mongodb_local
  #   ports:
  #     - "27017:27017"
  #   environment:
  #     MONGO_INITDB_DATABASE: resume_screening_db
  #   volumes:
  #     - mongodb_data:/data/db

volumes:
  mongodb_data: